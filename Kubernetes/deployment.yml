apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotstar-app
  labels:
    app: hotstar-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hotstar-app
  template:
    metadata:
      labels:
        app: hotstar-app
    spec:
      containers:
      - name: hotstar-app
        image: venkeyboda/hotstar-app:latest
        resources: 
          limits:
            cpu: 500m
            memory: 256M
          requests:
            cpu: 100m
            memory: 64M
        livenessProbe: 
          failureThreshold: 3
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe: 
          failureThreshold: 3
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 10            
        ports:
        - containerPort: 3000
