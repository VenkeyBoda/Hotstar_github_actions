name: Docker Image build and push CI

on:
  push:
    branches: [ "main" ]
  
  workflow_dispatch:      

jobs:

  changes:

    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.filter.outputs.ci }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Filter changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci:
              - 'public/**'
              - 'src/**'
              - 'Dockerfile'  

# =========================
# CI JOB
# =========================

  build:
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    
    runs-on: ubuntu-latest

    steps:

      - name: checkout  
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with: 
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the Docker image
        run: |
          docker build . \
          --file Dockerfile \
          --tag ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:latest
      
      - name: Push the Docker image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:latest

# =========================
# CD JOB
# =========================

  deploy:
    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: Infra
        run: terraform init

      - name: Terraform Plan
        working-directory: Infra
        run: |
          terraform plan \
              -var-file="terraform.tfvars" \
              -input=false \
              -out=tfplan

      - name: Terraform Apply
        working-directory: Infra
        run: terraform apply -auto-approve tfplan

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4  

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
          --resource-group ${{ vars.RG_NAME }} \
          --name ${{ vars.AKS_NAME }} \
          --overwrite-existing  

      - name: Wait cluster ready
        run: |
            az aks wait \
            --resource-group ${{ vars.RG_NAME }} \
            --name ${{ vars.AKS_NAME }} \
            --created

      - name: Verify cluster
        run: |
            kubectl cluster-info
            kubectl get nodes

      - name: Deploy manifests
        working-directory: Kubernetes
        run: kubectl apply -f .
          
      - name: Wait for LoadBalancer
        run: |
          kubectl wait \
          --for=jsonpath='{.status.loadBalancer.ingress[0].ip}' \
          service/hotstar-app  \
           --timeout=600s
          
      - name: Get service URL
        run: |
          kubectl get svc hotstar-app 
      
      - name: Print URL
        run: |
          IP=$(kubectl get svc/hotstar-app  \
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
          echo "Application URL:"
          echo "http://$IP" 
          


