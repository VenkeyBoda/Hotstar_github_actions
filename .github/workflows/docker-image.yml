name: Docker Image build and push CI

on:
  push:
    branches: [ "main" ]
jobs:

# =========================
# CI JOB
# =========================

  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout  
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with: 
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the Docker image
        run: |
          docker build . \
          --file Dockerfile \
          --tag ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:latest
      
      - name: Push the Docker image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:latest

# =========================
# CD JOB
# =========================

  deploy:
    needs: build

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Infra

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan --var=tfvars -out=tfplan

      - name: Terraform Apply
        run: terraform apply --var=tfvars -auto-approve tfplan
